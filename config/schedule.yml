# config/schedule.yml
# briefing_type/video_format 및 이 레포의 실행 창(window)을 정의한다.
# pipeline/config_schedule.py가 이 파일을 로드해 상수로 노출한다.

briefing_type: morning_core   # morning_core | report_update

window:
  start: "07:10"   # 이 시각 이전에 트리거되면 비정상(모니터링 기준)
  end:   "08:20"   # 이 시각을 넘겨 완료되면 SLA 위반으로 로그에 경고 표시

# stock-briefing-step2에서만 사용 (video_format 결정 기준). morning_core는
# 애초에 증권사 리포트를 다루지 않으므로 이 섹션이 비어 있다.
report_decision: {}

duration:
  # narrative_reorder.build_mention_briefing()("종목 언급 중심" 구성)으로
  # 바뀌면서 시장배경 해설/섹터분석/AI 투자전략/리스크 다이제스트가 전부
  # 빠지고 대형 주도주 2개+관심종목 위주로만 구성되므로, 기존 9~11분보다
  # 짧아질 것으로 예상해 목표를 낮췄다(pipeline/generate_video.py가 이 값을
  # 그대로 읽어 TARGET_MIN/MAX/IDEAL로 쓴다). 이 범위는 실제 생성물 길이를
  # 보고 재조정이 필요할 수 있는 잠정치다 — 짧은 스크립트를 억지로 늘리려고
  # adjust_to_target_duration()이 내레이션 속도를 부자연스럽게 낮추는 걸
  # 막는 게 목적이라, 실측 후 범위를 좁혀도 된다.
  longform:
    min_seconds: 300    # 5분
    max_seconds: 540    # 9분
  shorts:
    min_seconds: 30
    max_seconds: 60

# 이 레포는 항상 longform만 생성한다 (조건부 shorts 분기는 step2 전용).
default_video_format: longform
