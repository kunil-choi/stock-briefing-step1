# config/schedule.yml
# briefing_type/video_format 및 이 레포의 실행 창(window)을 정의한다.
# pipeline/config_schedule.py가 이 파일을 로드해 상수로 노출한다.

briefing_type: morning_core   # morning_core | report_update

window:
  start: "07:10"   # 이 시각 이전에 트리거되면 비정상(모니터링 기준)
  end:   "08:20"   # 이 시각을 넘겨 완료되면 SLA 위반으로 로그에 경고 표시

# stock-briefing-step2에서만 사용 (video_format 결정 기준). morning_core는
# 애초에 증권사 리포트를 다루지 않으므로 이 섹션이 비어 있다.
report_decision: {}

duration:
  # morning_core는 V3(증권사 리포트 제외)와 동등한 전체 콘텐츠를 훅 오프닝만
  # 덧붙여 그대로 영상화한 것이라 약 10분을 목표로 한다(pipeline/generate_video.py가
  # 이 값을 그대로 읽어 TARGET_MIN/MAX/IDEAL로 쓴다). 빠른 내레이션 속도
  # (config/audio.yml의 speaking_rate)를 함께 적용해 실제 체감 길이는 더 짧다.
  longform:
    min_seconds: 540    # 9분
    max_seconds: 660    # 11분
  shorts:
    min_seconds: 30
    max_seconds: 60

# 이 레포는 항상 longform만 생성한다 (조건부 shorts 분기는 step2 전용).
default_video_format: longform
