# config/schedule.yml
# briefing_type/video_format 및 이 레포의 실행 창(window)을 정의한다.
# pipeline/config_schedule.py가 이 파일을 로드해 상수로 노출한다.

briefing_type: morning_core   # morning_core | report_update

window:
  start: "07:10"   # 이 시각 이전에 트리거되면 비정상(모니터링 기준)
  end:   "08:20"   # 이 시각을 넘겨 완료되면 SLA 위반으로 로그에 경고 표시

# stock-briefing-step2에서만 사용 (video_format 결정 기준). morning_core는
# 애초에 증권사 리포트를 다루지 않으므로 이 섹션이 비어 있다.
report_decision: {}

duration:
  # 실측 결과(2026-07-23 실행) 종전 5~9분 범위에서 실제로는 6분39초로 나와
  # 8분 미만이었다 — stock_추가관심종목 narration이 프롬프트가 요구한 분량
  # (종목당 100자 이상)보다 짧게 나온 게 주 원인으로 보여 generate_script.py에
  # 분량 검증·재시도를 추가했다(FIX-AGGREGATE-NARRATION-LENGTH-1). 목표를
  # 8~10분으로 올려 그 콘텐츠 증가분이 실제 목표에 반영되게 한다(pipeline/
  # generate_video.py가 이 값을 그대로 읽어 TARGET_MIN/MAX/IDEAL로 쓴다).
  # 콘텐츠 자체가 부족한 채로 이 하한만 올리면 adjust_to_target_duration()이
  # 정지 프레임 패딩으로 시간만 채울 수 있으니, 분량 검증 재시도와 함께 봐야 한다.
  longform:
    min_seconds: 480    # 8분
    max_seconds: 600    # 10분
  shorts:
    min_seconds: 30
    max_seconds: 60

# 이 레포는 항상 longform만 생성한다 (조건부 shorts 분기는 step2 전용).
default_video_format: longform
