name: 📡 morning_core 영상 생성 (07:10~08:20 KST)

on:
  # 실제 영상을 생성하는 단계라 OpenAI/TTS 과금이 발생한다. stock-briefing-v3-1의
  # 자동 dispatch는 과금 방지를 위해 제거했다(2026-07) — v3-1의 docs/index.html로
  # 데이터를 사람이 먼저 확인한 뒤 이 workflow_dispatch를 수동으로 실행한다.
  # 자체 cron도 두지 않는다.
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          드라이런 모드 — OpenAI/TTS를 실제로 호출하지 않고
          (SCRIPT_MOCK/TTS_MOCK/MEDIA_MOCK) 파이프라인 전체를 무료로 검증만
          한다. license_log.csv 커밋도 건너뛴다.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  script:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install openai playwright Pillow pandas matplotlib pykrx requests python-dotenv pyyaml pydantic
          playwright install chromium
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRIPT_MOCK: ${{ inputs.dry_run && '1' || '' }}
        run: python pipeline/generate_script.py KO
      - name: 🧩 scene_plan.json 생성 (개체명 추출 + 비주얼 우선순위)
        run: python pipeline/generate_scene_plan.py KO
      - name: 🧭 reordered_script.json 생성 (장전 의사결정형 플롯)
        run: python pipeline/generate_reordered_script.py KO
      - uses: actions/upload-artifact@v4
        with:
          name: script
          path: output/KO/scripts/

  voice:
    needs: script
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install openai requests Pillow>=10.0.0 pyyaml
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg  # atempo/loudnorm 후처리에 필요
      - uses: actions/download-artifact@v4
        with:
          name: script
          path: output/KO/scripts/
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # 아래 두 provider는 Secret이 등록되면 config/audio.yml의
          # provider_priority 순서대로 자동으로 사용된다(키가 없으면 OpenAI로
          # 폴백 — 코드 변경 불필요, Phase C의 YONHAP_API_KEY/KBS_API_KEY와
          # 동일한 패턴).
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          TTS_MOCK: ${{ inputs.dry_run && '1' || '' }}
        run: python pipeline/generate_voice.py KO
      - name: TTS 결과 검증
        run: |
          echo "=== 생성된 오디오 파일 목록 ==="
          ls -lh output/KO/audio/ || echo "audio 폴더 없음"
          total=$(ls output/KO/audio/*.mp3 2>/dev/null | wc -l)
          echo "총 MP3 파일 수: $total"
          if [ "$total" -lt 5 ]; then
            echo "❌ MP3 파일이 너무 적습니다 ($total개). TTS 실패 가능성."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: voice
          path: output/KO/audio/
      - uses: actions/upload-artifact@v4
        with:
          name: audio_report
          path: output/KO/audio_report.json

  assets:
    needs: [script]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # media 잡 스텝이 7일 중복 감지용 data/media/license_log.csv를 레포에
    # 커밋해야 하므로 이 잡에 한해 write 권한이 필요하다(워크플로우 전체
    # 기본값은 read로 유지).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra ffmpeg
          fc-cache -fv
          pip install requests Pillow>=10.0.0 pykrx matplotlib pandas mplfinance python-dotenv playwright imagehash pyyaml
          playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: script
          path: output/KO/scripts/
      # generate_assets.py가 media_map.json(선택된 배경 이미지)을 읽어 프레임에
      # 반영하므로, 반드시 generate_media.py보다 먼저 실행되면 안 된다(이전에는
      # 순서가 반대라 media_map.json이 아직 없는 상태로 프레임이 만들어져 매번
      # "media_map.json 없음 — 배경 이미지 없이 기존 방식으로 렌더링"으로
      # 폴백하던 버그가 있었다 — 3차 작업의 배경 이미지 반영이 실제로는 한 번도
      # 적용되지 못했던 원인).
      - name: 🖼️ media_map.json 생성 (연합뉴스/KBS 이미지 검색)
        env:
          YONHAP_API_KEY: ${{ secrets.YONHAP_API_KEY }}
          KBS_API_KEY: ${{ secrets.KBS_API_KEY }}
          MEDIA_MOCK: ${{ inputs.dry_run && '1' || '' }}
        run: python pipeline/generate_media.py KO
      - uses: actions/upload-artifact@v4
        with:
          name: media
          path: output/KO/media/
      - run: python pipeline/generate_assets.py KO
      - uses: actions/upload-artifact@v4
        with:
          name: assets
          path: output/KO/frames/
      - name: 📇 license_log.csv 커밋 (7일 중복 감지 유지용)
        # 드라이런은 MEDIA_MOCK의 가짜(mock://...) 항목을 남기므로, 실제 중복
        # 감지 로그를 오염시키지 않도록 커밋 자체를 건너뛴다.
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -n "$(git status --porcelain data/media/license_log.csv 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/media/license_log.csv
            git commit -m "chore: license_log.csv 업데이트 ($(TZ='Asia/Seoul' date +'%Y-%m-%d'))"
            git pull --rebase
            git push
          else
            echo "license_log.csv 변경 없음 → 커밋 생략"
          fi

  video:
    needs: [script, voice, assets]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra ffmpeg libass-dev libass9
          fc-cache -fv
          pip install openai requests Pillow>=10.0.0 pyyaml playwright pykrx matplotlib pandas mplfinance
          playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: script
          path: output/KO/scripts/
      - uses: actions/download-artifact@v4
        with:
          name: voice
          path: output/KO/audio/
      - uses: actions/download-artifact@v4
        with:
          name: audio_report
          path: output/KO/
      - uses: actions/download-artifact@v4
        with:
          name: assets
          path: output/KO/frames/
      - name: asset_map.json 생성
        run: |
          python - <<'PY'
          import glob, json, os
          frames = sorted(glob.glob('output/KO/frames/*.png'))
          os.makedirs('output/KO', exist_ok=True)
          json.dump({'frames': frames, 'lang': 'KO'}, open('output/KO/asset_map.json','w',encoding='utf-8'), ensure_ascii=False, indent=2)
          PY
      - name: 🏆 주도주 랭킹 생성 (TOP5 카드 + TOP1~3 쇼츠)
        run: python pipeline/generate_ranking.py KO
      - run: python pipeline/generate_subtitles.py KO
      - run: python pipeline/generate_video.py KO
      - name: 📋 YouTube 메타데이터 생성 (제목/설명/태그/썸네일)
        run: python pipeline/generate_metadata.py KO
      - name: ✅ 결과물 검증 (영상 길이 + metadata.json)
        run: python pipeline/quality_gate.py KO
      - name: 📦 배포 산출물 업로드 (output/YYYY-MM-DD/)
        run: |
          DATE_DIR=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          echo "DATE_DIR=${DATE_DIR}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.dry_run && format('dryrun-{0}', env.DATE_DIR) || format('morning_core-{0}', env.DATE_DIR) }}
          path: output/${{ env.DATE_DIR }}/
          retention-days: 30
